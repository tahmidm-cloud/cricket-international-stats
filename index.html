<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#061018" />
  <title>My Cricket Player Database</title>

  <style>
    :root {
      --bg: #061018;
      --bg2: #020617;
      --panel: rgba(15, 23, 42, 0.96);
      --panel2: rgba(30, 41, 59, 0.92);
      --line: rgba(148, 163, 184, 0.22);
      --line2: rgba(148, 163, 184, 0.13);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --gold: #facc15;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #fb7185;
      --white: #ffffff;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.48);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(250, 204, 21, 0.10), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(1460px, 100%);
      margin: 0 auto;
      padding: calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));
    }

    .top-card {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.88));
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-main-btn {
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.7);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    h1 {
      margin: 10px 0 4px;
      font-size: clamp(24px, 6vw, 42px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .status-pill {
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.62);
      color: var(--muted);
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 150px 150px 110px;
      gap: 10px;
      margin-top: 14px;
    }

    .search-input,
    .filter-select,
    .edit-input,
    .edit-select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.76);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      outline: none;
      min-width: 0;
    }

    .search-input:focus,
    .filter-select:focus,
    .edit-input:focus,
    .edit-select:focus {
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
    }

    .main-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px;
      color: #020617;
      background: linear-gradient(135deg, var(--gold), var(--blue));
      font-weight: 950;
      cursor: pointer;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    .summary-box {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.78);
      border-radius: 18px;
      padding: 12px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .summary-value {
      margin-top: 4px;
      color: var(--white);
      font-size: 22px;
      font-weight: 950;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 10px 0 12px;
      flex-wrap: wrap;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
    }

    .small-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.74);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 750;
    }

    .ghost-btn:hover {
      border-color: rgba(250, 204, 21, 0.55);
    }

    .player-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 11px;
      padding-bottom: 40px;
    }

    .player-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.9));
      border-radius: 18px;
      padding: 13px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      min-width: 0;
    }

    .player-card:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.65);
    }

    .player-card.edited-card {
      border-color: rgba(250, 204, 21, 0.65);
    }

    .player-name {
      color: var(--white);
      font-size: 16px;
      font-weight: 950;
      line-height: 1.2;
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .player-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.56);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 11px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip.edited-chip {
      color: #fef3c7;
      border-color: rgba(250, 204, 21, 0.45);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .mini-box {
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(2, 6, 23, 0.42);
      border-radius: 12px;
      padding: 8px;
      min-width: 0;
    }

    .mini-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }

    .mini-value {
      font-size: 13px;
      font-weight: 850;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .loading,
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 34px 10px;
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.52);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bottom));
      background: rgba(2, 6, 23, 0.78);
      backdrop-filter: blur(8px);
      z-index: 2000;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(1000px, calc(100vw - 16px));
      max-height: calc(100dvh - 18px - var(--safe-top) - var(--safe-bottom));
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.99), rgba(2, 6, 23, 0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .modal-title {
      color: var(--white);
      font-size: 24px;
      font-weight: 1000;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .modal-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .close-btn {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.6);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 950;
    }

    .modal-body {
      padding: 12px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.99), rgba(15, 23, 42, 0.86));
      padding-bottom: 8px;
    }

    .toggle-btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.84);
      color: var(--text);
      border-radius: 999px;
      padding: 10px;
      cursor: pointer;
      font-weight: 900;
      font-size: 13px;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--blue));
      color: #020617;
      border-color: transparent;
    }

    .profile-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin: 4px 0 12px;
    }

    .profile-grid,
    .edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .profile-card,
    .edit-card {
      border: 1px solid var(--line2);
      background: rgba(15, 23, 42, 0.72);
      border-radius: 15px;
      padding: 10px;
      min-width: 0;
    }

    .profile-card.wide,
    .edit-card.wide {
      grid-column: 1 / -1;
    }

    .profile-label,
    .edit-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .profile-value {
      color: var(--white);
      font-size: 14px;
      font-weight: 850;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .profile-value.small {
      font-size: 12px;
      font-weight: 650;
      color: var(--text);
    }

    .active-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(2, 6, 23, 0.5);
    }

    .active-pill.active {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.36);
    }

    .active-pill.retired {
      color: #fde68a;
      border-color: rgba(250, 204, 21, 0.36);
    }

    .active-pill.passed_away {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.36);
    }

    .stats-control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 4px 0 10px;
    }

    .domestic-note {
      color: rgba(148, 163, 184, 0.95);
      font-size: 11px;
    }

    .domestic-toggle-btn {
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.84);
      color: #e5e7eb;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 900;
      cursor: pointer;
      font-size: 12px;
    }

    .domestic-toggle-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--blue));
      color: #020617;
      border-color: transparent;
    }

    .stats-section-title {
      color: var(--text);
      font-weight: 950;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 13px;
      margin: 12px 0 8px;
    }

    .stats-table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line2);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.64);
    }

    .stats-table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .stats-table th,
    .stats-table td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      border-right: 1px solid rgba(148, 163, 184, 0.08);
      padding: 9px 10px;
      text-align: center;
      white-space: nowrap;
    }

    .stats-table th {
      color: var(--gold);
      background: rgba(2, 6, 23, 0.66);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .stats-table td {
      color: #f8fafc;
      font-weight: 800;
    }

    .stats-table th:first-child,
    .stats-table td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 3;
      background: rgba(7, 14, 27, 0.98);
      font-weight: 950;
      color: var(--white);
    }

    .stats-table th:first-child {
      z-index: 4;
      color: var(--gold);
      background: rgba(2, 6, 23, 0.98);
    }

    .strong-stat {
      font-weight: 1000 !important;
      color: #ffffff !important;
    }

    .source-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      margin-top: 10px;
    }

    @media (max-width: 760px) {
      .page {
        padding-left: 10px;
        padding-right: 10px;
      }

      .top-card {
        border-radius: 20px;
        padding: 13px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .summary-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary-value {
        font-size: 20px;
      }

      .player-list {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .player-card {
        border-radius: 16px;
        padding: 12px;
      }

      .modal {
        width: calc(100vw - 12px);
        max-height: calc(100dvh - 12px - var(--safe-top) - var(--safe-bottom));
        border-radius: 18px;
      }

      .modal-header {
        padding: 12px;
      }

      .modal-title {
        font-size: 20px;
      }

      .modal-body {
        padding: 10px;
      }

      .profile-grid,
      .edit-grid {
        grid-template-columns: 1fr;
      }

      .stats-table {
        min-width: 820px;
        font-size: 12px;
      }

      .stats-table th,
      .stats-table td {
        padding: 8px 9px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="top-card">
      <div class="top-row">
        <div>
          <button class="back-main-btn" type="button" onclick="window.location.href='index.html'">
            ← Back to Main Menu
          </button>
          <h1>Player Database</h1>
          <div class="subtitle">
            Lists every player. Tap a player to view profile, edit standardized fields, or view stats.
          </div>
        </div>

        <div class="status-pill" id="loadStatus">Loading JSON...</div>
      </div>

      <div class="controls">
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Search player, country, role, style, Cricinfo ID..."
          autocomplete="off"
        />

        <select id="countryFilter" class="filter-select">
          <option value="">All Countries</option>
        </select>

        <select id="activeFilter" class="filter-select">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="retired">Retired</option>
          <option value="passed_away">Passed Away</option>
          <option value="blank">Unknown</option>
        </select>

        <button class="main-btn" id="resetBtn" type="button">Reset</button>
      </div>
    </section>

    <section class="summary-row">
      <div class="summary-box">
        <div class="summary-label">Total Players</div>
        <div class="summary-value" id="totalPlayers">—</div>
      </div>

      <div class="summary-box">
        <div class="summary-label">Countries</div>
        <div class="summary-value" id="totalCountries">—</div>
      </div>

      <div class="summary-box">
        <div class="summary-label">Showing</div>
        <div class="summary-value" id="showingCount">—</div>
      </div>

      <div class="summary-box">
        <div class="summary-label">Edited</div>
        <div class="summary-value" id="editedCount">0</div>
      </div>
    </section>

    <div class="toolbar">
      <div class="result-count" id="resultCount">Preparing player list...</div>

      <div class="small-actions">
        <button class="ghost-btn" id="sortNameBtn" type="button">Sort A-Z</button>
        <button class="ghost-btn" id="sortCountryBtn" type="button">Sort Country</button>
        <button class="ghost-btn" id="sortActiveBtn" type="button">Sort Status</button>
        <button class="ghost-btn" id="downloadJsonBtn" type="button">Download Combined JSON</button>
        <button class="ghost-btn" id="downloadCsvBtn" type="button">Download Combined CSV</button>
      </div>
    </div>

    <section id="playerList" class="player-list">
      <div class="loading">Loading players...</div>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <section class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">Player</div>
          <div class="modal-subtitle" id="modalSubtitle">Country • Cricinfo ID</div>
        </div>

        <button class="close-btn" id="closeModalBtn" type="button">×</button>
      </div>

      <div class="modal-body">
        <div class="toggle-row">
          <button class="toggle-btn active" id="profileToggle" type="button">Player Profile</button>
          <button class="toggle-btn" id="statsToggle" type="button">Player Stats</button>
        </div>

        <div id="modalContent"></div>
      </div>
    </section>
  </div>

  <script>
    const PROFILE_JSON_PATH = "outputs/player_index_espn_slim_keyed.json";
    const STATS_JSON_PATH = "outputs/all_international_stats_enriched.json";

    let allPlayers = [];
    let filteredPlayers = [];
    let statsIndex = {};
    let currentPlayer = null;
    let currentView = "profile";
    let currentSort = "name";
    let showDomesticStats = false;
    let isEditingProfile = false;

    const ROLE_OPTIONS = [
      { id: "", label: "Unknown" },
      { id: "OP", label: "Opener" },
      { id: "TBT", label: "Top-order batter" },
      { id: "MBT", label: "Middle-order batter" },
      { id: "BAT", label: "Batter" },
      { id: "FIN", label: "Finisher" },
      { id: "WKT", label: "Wicketkeeper" },
      { id: "WKBT", label: "Wicketkeeper batter" },
      { id: "AR", label: "Allrounder" },
      { id: "BTAR", label: "Batting allrounder" },
      { id: "BWAR", label: "Bowling allrounder" },
      { id: "BWL", label: "Bowler" },
      { id: "FB", label: "Fast bowler" },
      { id: "SPIN", label: "Spin bowler" }
    ];

    const BATTING_STYLE_OPTIONS = [
      { code: "", style: "" },
      { code: "RHB", style: "Right Hand Bat" },
      { code: "LHB", style: "Left Hand Bat" }
    ];

    const BOWLING_STYLE_OPTIONS = [
      { code: "", style: "" },
      { code: "RF", style: "Right Arm Fast" },
      { code: "RFM", style: "Right Arm Fast Medium" },
      { code: "RMF", style: "Right Arm Medium Fast" },
      { code: "RM", style: "Right Arm Medium" },
      { code: "LF", style: "Left Arm Fast" },
      { code: "LFM", style: "Left Arm Fast Medium" },
      { code: "LMF", style: "Left Arm Medium Fast" },
      { code: "LM", style: "Left Arm Medium" },
      { code: "OB", style: "Right Arm Off Break" },
      { code: "LB", style: "Leg Break" },
      { code: "LBG", style: "Leg Break Googly" },
      { code: "SLA", style: "Slow Left Arm Orthodox" },
      { code: "LWS", style: "Left Arm Wrist Spin" }
    ];

    const INTERNATIONAL_FORMAT_ROWS = [
      { key: "test", altKeys: ["test", "tests"], label: "Tests" },
      { key: "odi", altKeys: ["odi", "odis"], label: "ODIs" },
      { key: "t20", altKeys: ["t20", "t20i", "t20is"], label: "T20Is" }
    ];

    const DOMESTIC_FORMAT_ROWS = [
      { key: "fc", altKeys: ["fc", "firstclass", "first_class"], label: "FC" },
      { key: "lista", altKeys: ["lista", "list_a", "listA"], label: "List A" },
      { key: "t20s", altKeys: ["t20s", "domestic_t20"], label: "T20s" }
    ];

    const els = {
      loadStatus: document.getElementById("loadStatus"),
      searchInput: document.getElementById("searchInput"),
      countryFilter: document.getElementById("countryFilter"),
      activeFilter: document.getElementById("activeFilter"),
      resetBtn: document.getElementById("resetBtn"),
      totalPlayers: document.getElementById("totalPlayers"),
      totalCountries: document.getElementById("totalCountries"),
      showingCount: document.getElementById("showingCount"),
      editedCount: document.getElementById("editedCount"),
      resultCount: document.getElementById("resultCount"),
      playerList: document.getElementById("playerList"),
      sortNameBtn: document.getElementById("sortNameBtn"),
      sortCountryBtn: document.getElementById("sortCountryBtn"),
      sortActiveBtn: document.getElementById("sortActiveBtn"),
      downloadJsonBtn: document.getElementById("downloadJsonBtn"),
      downloadCsvBtn: document.getElementById("downloadCsvBtn"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      closeModalBtn: document.getElementById("closeModalBtn"),
      modalTitle: document.getElementById("modalTitle"),
      modalSubtitle: document.getElementById("modalSubtitle"),
      profileToggle: document.getElementById("profileToggle"),
      statsToggle: document.getElementById("statsToggle"),
      modalContent: document.getElementById("modalContent")
    };

    function cleanText(value) {
      if (
        value === null ||
        value === undefined ||
        value === "" ||
        value === "null" ||
        value === "None" ||
        value === "none" ||
        value === "NaN" ||
        value === "nan"
      ) {
        return "";
      }

      return String(value).trim();
    }

    function showValue(value, fallback = "—") {
      const cleaned = cleanText(value);
      return cleaned || fallback;
    }

    function escapeHtml(value) {
      return String(showValue(value, ""))
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cleanDate(value) {
      const text = cleanText(value);

      if (!text) return "";

      if (text.includes("T")) {
        return text.split("T")[0];
      }

      return text.slice(0, 10);
    }

    function getId(player) {
      return cleanText(player.cricinfo_id || player.unique_player_id || player.id);
    }

    function getName(player) {
      return cleanText(
        player.final_player_name ||
        player.espn_display_name ||
        player.espn_full_name
      ) || "Unknown Player";
    }

    function getFullName(player) {
      return cleanText(player.espn_full_name || player.espn_display_name || getName(player));
    }

    function getCountry(player) {
      return cleanText(player.espn_country_name || player.source_country_text) || "Unknown";
    }

    function getDeathDate(player) {
      return cleanDate(
        player.espn_date_of_death ||
        player.date_of_death ||
        player.date_of_death_str ||
        player.espn_date_of_death_str
      );
    }

    function getStatusKey(player) {
      const deathDate = getDeathDate(player);
      const raw = cleanText(player.espn_active_status).toLowerCase();

      if (
        deathDate ||
        raw === "passed_away" ||
        raw === "passed away" ||
        raw === "deceased" ||
        raw === "dead"
      ) {
        return "passed_away";
      }

      if (raw === "active") {
        return "active";
      }

      if (raw === "inactive" || raw === "retired") {
        return "retired";
      }

      return "";
    }

    function getStatusLabel(player) {
      const status = getStatusKey(player);

      if (status === "active") return "Active";
      if (status === "retired") return "Retired";
      if (status === "passed_away") return "Passed Away";

      return "Unknown";
    }

    function calculateAge(dob, deathDate) {
      dob = cleanDate(dob);
      deathDate = cleanDate(deathDate);

      if (!dob) return "";

      const birthDate = new Date(dob);
      if (Number.isNaN(birthDate.getTime())) return "";

      const endDate = deathDate ? new Date(deathDate) : new Date();
      if (Number.isNaN(endDate.getTime())) return "";

      let age = endDate.getFullYear() - birthDate.getFullYear();
      const monthDiff = endDate.getMonth() - birthDate.getMonth();
      const dayDiff = endDate.getDate() - birthDate.getDate();

      if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age--;
      }

      return age >= 0 ? String(age) : "";
    }

    async function fetchJson(path, fallback) {
      try {
        const response = await fetch(path, { cache: "no-store" });

        if (!response.ok) {
          console.warn(`Could not load ${path}. Status ${response.status}`);
          return fallback;
        }

        return await response.json();
      } catch (err) {
        console.warn(`Could not load ${path}`, err);
        return fallback;
      }
    }

    function normalizeProfiles(data) {
      if (Array.isArray(data)) {
        return data;
      }

      if (data && typeof data === "object") {
        return Object.entries(data).map(([id, player]) => ({
          cricinfo_id: player.cricinfo_id || id,
          ...player
        }));
      }

      return [];
    }

    function normalizeLoadedPlayer(player) {
      player.espn_date_of_birth = cleanDate(player.espn_date_of_birth || player.date_of_birth || player.date_of_birth_str);
      player.espn_date_of_death = getDeathDate(player);
      player.espn_active_status = getStatusKey(player);

      if (player.espn_active_status === "active") {
        player.espn_is_active = true;
      } else if (player.espn_active_status === "retired" || player.espn_active_status === "passed_away") {
        player.espn_is_active = false;
      }

      return player;
    }

    async function loadData() {
      els.loadStatus.textContent = "Loading JSON...";

      const [profileData, statsData] = await Promise.all([
        fetchJson(PROFILE_JSON_PATH, {}),
        fetchJson(STATS_JSON_PATH, {})
      ]);

      allPlayers = normalizeProfiles(profileData).map(normalizeLoadedPlayer);
      statsIndex = statsData || {};

      allPlayers.sort((a, b) => getName(a).localeCompare(getName(b)));
      filteredPlayers = [...allPlayers];

      buildFilters();
      updateSummary();
      renderPlayers();

      els.loadStatus.textContent = `Loaded ${allPlayers.length.toLocaleString()} players`;
    }

    function buildFilters() {
      const countries = [...new Set(allPlayers.map(getCountry).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));

      els.countryFilter.innerHTML = `
        <option value="">All Countries</option>
        ${countries.map(country => `
          <option value="${escapeHtml(country)}">${escapeHtml(country)}</option>
        `).join("")}
      `;
    }

    function applyFilters() {
      const q = els.searchInput.value.trim().toLowerCase();
      const country = els.countryFilter.value;
      const active = els.activeFilter.value;

      filteredPlayers = allPlayers.filter(player => {
        const status = getStatusKey(player);

        const blob = [
          getId(player),
          getName(player),
          getFullName(player),
          getCountry(player),
          player.source_country_text,
          player.espn_playing_role,
          player.espn_playing_role_id,
          player.standard_batting_code,
          player.standard_batting_style,
          player.standard_bowling_code,
          player.standard_bowling_style,
          player.espn_major_teams,
          status
        ].join(" ").toLowerCase();

        const matchesSearch = !q || blob.includes(q);
        const matchesCountry = !country || getCountry(player) === country;

        let matchesActive = true;

        if (active === "active") {
          matchesActive = status === "active";
        } else if (active === "retired") {
          matchesActive = status === "retired";
        } else if (active === "passed_away") {
          matchesActive = status === "passed_away";
        } else if (active === "blank") {
          matchesActive = !status;
        }

        return matchesSearch && matchesCountry && matchesActive;
      });

      sortPlayers();
      updateSummary();
      renderPlayers();
    }

    function sortPlayers() {
      if (currentSort === "country") {
        filteredPlayers.sort((a, b) => {
          const c = getCountry(a).localeCompare(getCountry(b));
          return c || getName(a).localeCompare(getName(b));
        });
        return;
      }

      if (currentSort === "active") {
        filteredPlayers.sort((a, b) => {
          const s = getStatusLabel(a).localeCompare(getStatusLabel(b));
          return s || getName(a).localeCompare(getName(b));
        });
        return;
      }

      filteredPlayers.sort((a, b) => getName(a).localeCompare(getName(b)));
    }

    function updateSummary() {
      const countries = new Set(allPlayers.map(getCountry).filter(Boolean));
      const edited = allPlayers.filter(p => p._edited === true).length;

      els.totalPlayers.textContent = allPlayers.length.toLocaleString();
      els.totalCountries.textContent = countries.size.toLocaleString();
      els.showingCount.textContent = filteredPlayers.length.toLocaleString();
      els.editedCount.textContent = edited.toLocaleString();
      els.resultCount.textContent =
        `Showing ${filteredPlayers.length.toLocaleString()} of ${allPlayers.length.toLocaleString()} players`;
    }

    function renderPlayers() {
      if (!filteredPlayers.length) {
        els.playerList.innerHTML = `<div class="empty">No players found.</div>`;
        return;
      }

      const cards = filteredPlayers.map((player, index) => {
        const status = getStatusKey(player);
        const deathDate = getDeathDate(player);

        return `
          <article class="player-card ${player._edited ? "edited-card" : ""}" data-index="${index}" tabindex="0">
            <div class="player-name">${escapeHtml(getName(player))}</div>

            <div class="player-meta">
              <span class="chip">${escapeHtml(getCountry(player))}</span>
              <span class="chip">ID: ${escapeHtml(getId(player))}</span>
              <span class="chip">${escapeHtml(getStatusLabel(player))}</span>
              ${player._edited ? `<span class="chip edited-chip">Edited</span>` : ""}
            </div>

            <div class="mini-grid">
              <div class="mini-box">
                <div class="mini-label">Role</div>
                <div class="mini-value">${escapeHtml(showValue(player.espn_playing_role))}</div>
              </div>

              <div class="mini-box">
                <div class="mini-label">Bat</div>
                <div class="mini-value">${escapeHtml(showValue(player.standard_batting_code))}</div>
              </div>

              <div class="mini-box">
                <div class="mini-label">Bowl</div>
                <div class="mini-value">${escapeHtml(showValue(player.standard_bowling_code, "None"))}</div>
              </div>

              <div class="mini-box">
                <div class="mini-label">${status === "passed_away" ? "Died" : "DOB"}</div>
                <div class="mini-value">${escapeHtml(showValue(status === "passed_away" ? deathDate : player.espn_date_of_birth))}</div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      els.playerList.innerHTML = cards;

      document.querySelectorAll(".player-card").forEach(card => {
        card.addEventListener("click", () => {
          const index = Number(card.dataset.index);
          openModal(filteredPlayers[index]);
        });

        card.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            const index = Number(card.dataset.index);
            openModal(filteredPlayers[index]);
          }
        });
      });
    }

      els.modalTitle.textContent = getFullName(player);

      updateModalToggles();
      renderModalContent();

      els.modalBackdrop.classList.add("show");
      document.body.style.overflow = "hidden";
    }

      els.modalBackdrop.classList.remove("show");
      document.body.style.overflow = "";

      els.profileToggle.classList.toggle("active", currentView === "profile");
      els.statsToggle.classList.toggle("active", currentView === "stats");

        renderStats();

    function saveProfileChanges() {
      const roleId = document.getElementById("editRole").value;
      const status = document.getElementById("editStatus").value;
      const dob = cleanDate(document.getElementById("editDob").value);
      const deathDate = cleanDate(document.getElementById("editDeathDate").value);
      const batCode = document.getElementById("editBattingStyle").value;
      const bowlCode = document.getElementById("editBowlingStyle").value;

      const role = ROLE_OPTIONS.find(item => item.id === roleId) || ROLE_OPTIONS[0];
      const bat = BATTING_STYLE_OPTIONS.find(item => item.code === batCode) || BATTING_STYLE_OPTIONS[0];
      const bowl = BOWLING_STYLE_OPTIONS.find(item => item.code === bowlCode) || BOWLING_STYLE_OPTIONS[0];

      currentPlayer.espn_playing_role_id = role.id;
      currentPlayer.espn_playing_role = role.id ? role.label : "";

      currentPlayer.espn_date_of_birth = dob;
      currentPlayer.espn_date_of_death = deathDate;

      currentPlayer.standard_batting_code = bat.code;
      currentPlayer.standard_batting_style = bat.style;

      currentPlayer.standard_bowling_code = bowl.code;
      currentPlayer.standard_bowling_style = bowl.style;

      if (deathDate) {
        currentPlayer.espn_active_status = "passed_away";
        currentPlayer.espn_is_active = false;
      } else if (status === "active") {
        currentPlayer.espn_active_status = "active";
        currentPlayer.espn_is_active = true;
      } else if (status === "retired") {
        currentPlayer.espn_active_status = "retired";
        currentPlayer.espn_is_active = false;
      } else if (status === "passed_away") {
        currentPlayer.espn_active_status = "passed_away";
        currentPlayer.espn_is_active = false;
      } else {
        currentPlayer.espn_active_status = "";
        currentPlayer.espn_is_active = "";
      }

      currentPlayer._edited = true;
      currentPlayer._edited_at = new Date().toISOString();

      isEditingProfile = false;

      applyFilters();

      els.modalTitle.textContent = getFullName(currentPlayer);
      els.modalSubtitle.textContent =
        `${getCountry(currentPlayer)} • Cricinfo ID: ${getId(currentPlayer)}`;

      renderModalContent();
    }

    function getStatsObject(player) {
      const id = getId(player);
      return statsIndex[id] || {};

    function getFormatData(stats, type, formatRow) {
      const bucket = stats?.[type] || {};

      for (const key of formatRow.altKeys) {
        if (bucket[key]) {
          return bucket[key];
        }
      }

      return {};
    }

    function hasAnyData(obj) {
      if (!obj || typeof obj !== "object") return false;

      return Object.values(obj).some(value => {
        if (value === null || value === undefined || value === "") return false;
        if (String(value).toLowerCase() === "nan") return false;
        return true;
      });
    }

    function formatHighScore(score, notOut) {
      if (score === null || score === undefined || score === "") return "";

      const isNotOut =
        notOut === true ||
        notOut === "true" ||
        notOut === "1" ||
        notOut === "*";

      return `${score}${isNotOut ? "*" : ""}`;
    }

        </div>
      `;

      const domesticBtn = document.getElementById("domesticStatsToggleBtn");

      if (domesticBtn) {
        domesticBtn.addEventListener("click", () => {
          showDomesticStats = !showDomesticStats;
          renderStats();
        });
      }
    }

    function renderBatFieldRow(stats, row) {
      const bat = getFormatData(stats, "batting", row);
      const field = getFormatData(stats, "fielding", row);

      const empty = !hasAnyData(bat) && !hasAnyData(field);

      return `
        <tr>
          <td>${escapeHtml(row.label)}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Matches || field.Matches))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Innings))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.NotOuts))}</td>
          <td class="strong-stat">${escapeHtml(empty ? "—" : showValue(bat.Runs))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(formatHighScore(bat.HighScore, bat.HighScoreNotOut)))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Average))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.BallsFaced))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.StrikeRate))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Hundreds))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Fifties))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Fours))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Sixes))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(field.Caught || field.CaughtFielder || field.CaughtBehind))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(field.Stumped))}</td>
        </tr>
      `;
    }

    function renderBowlingRow(stats, row) {
      const bowl = getFormatData(stats, "bowling", row);
      const empty = !hasAnyData(bowl);

      return `
        <tr>
          <td>${escapeHtml(row.label)}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Matches))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Innings))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Balls))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.RunsConceded || bowl.Runs))}</td>
          <td class="strong-stat">${escapeHtml(empty ? "—" : showValue(bowl.Wickets))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.BestBowlingInnings))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.BestBowlingMatch))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Average))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Economy))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.StrikeRate))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.FourWickets))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.FiveWickets))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.TenWickets))}</td>
        </tr>
      `;
    }

    function getCleanProfileForDownload(player) {
      return {
        cricinfo_id: getId(player),
        unique_player_id: cleanText(player.unique_player_id),
        final_player_name: cleanText(player.final_player_name),
        source_country_text: cleanText(player.source_country_text),
        espn_profile_found: player.espn_profile_found === true || player.espn_profile_found === "true",

        espn_full_name: cleanText(player.espn_full_name),
        espn_display_name: cleanText(player.espn_display_name),
        espn_first_name: cleanText(player.espn_first_name),
        espn_last_name: cleanText(player.espn_last_name),
        espn_date_of_birth: cleanDate(player.espn_date_of_birth),
        espn_date_of_death: getDeathDate(player),

        espn_is_active: player.espn_active_status === "active",
        espn_active_status: getStatusKey(player),

        standard_batting_code: cleanText(player.standard_batting_code),
        standard_batting_style: cleanText(player.standard_batting_style),

        standard_bowling_code: cleanText(player.standard_bowling_code),
        standard_bowling_style: cleanText(player.standard_bowling_style),

        espn_playing_role: cleanText(player.espn_playing_role),
        espn_playing_role_id: cleanText(player.espn_playing_role_id),

        espn_country_name: cleanText(player.espn_country_name),
        espn_major_teams: cleanText(player.espn_major_teams),

        edited: player._edited === true,
        edited_at: cleanText(player._edited_at)
      };
    }

    function downloadTextFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function downloadCombinedJson() {
      const out = {};

      allPlayers.forEach(player => {
        const id = getId(player);

        if (!id) return;

        out[id] = {
          profile: getCleanProfileForDownload(player),
          stats: statsIndex[id] || {}
        };
      });

      downloadTextFile(
        "players_profile_stats_combined_edited.json",
        JSON.stringify(out, null, 2),
        "application/json"
      );
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function statValue(stats, type, formatKey, field) {
      const row = INTERNATIONAL_FORMAT_ROWS.find(item => item.key === formatKey);
      if (!row) return "";

      const obj = getFormatData(stats, type, row);
      return cleanText(obj?.[field]);
    }

    function downloadCombinedCsv() {
      const rows = allPlayers.map(player => {
        const id = getId(player);
        const profile = getCleanProfileForDownload(player);
        const stats = statsIndex[id] || {};

        return {
          cricinfo_id: profile.cricinfo_id,
          final_player_name: profile.final_player_name,
          espn_full_name: profile.espn_full_name,
          espn_country_name: profile.espn_country_name,
          active_status: profile.espn_active_status,
          date_of_birth: profile.espn_date_of_birth,
          date_of_death: profile.espn_date_of_death,
          playing_role: profile.espn_playing_role,
          playing_role_id: profile.espn_playing_role_id,
          batting_code: profile.standard_batting_code,
          batting_style: profile.standard_batting_style,
          bowling_code: profile.standard_bowling_code,
          bowling_style: profile.standard_bowling_style,
          major_teams: profile.espn_major_teams,
          edited: profile.edited,
          edited_at: profile.edited_at,

          test_matches: statValue(stats, "batting", "test", "Matches"),
          test_runs: statValue(stats, "batting", "test", "Runs"),
          test_bat_avg: statValue(stats, "batting", "test", "Average"),
          test_wickets: statValue(stats, "bowling", "test", "Wickets"),

          odi_matches: statValue(stats, "batting", "odi", "Matches"),
          odi_runs: statValue(stats, "batting", "odi", "Runs"),
          odi_bat_avg: statValue(stats, "batting", "odi", "Average"),
          odi_wickets: statValue(stats, "bowling", "odi", "Wickets"),

          t20_matches: statValue(stats, "batting", "t20", "Matches"),
          t20_runs: statValue(stats, "batting", "t20", "Runs"),
          t20_bat_avg: statValue(stats, "batting", "t20", "Average"),
          t20_wickets: statValue(stats, "bowling", "t20", "Wickets")
        };
      });

      const headers = Object.keys(rows[0] || {});
      const csv = [
        headers.map(csvEscape).join(","),
        ...rows.map(row => headers.map(header => csvEscape(row[header])).join(","))
      ].join("\n");

      downloadTextFile(
        "players_profile_stats_combined_edited.csv",
        csv,
        "text/csv"
      );
    }

    function downloadSinglePlayerJson(player) {
      const id = getId(player);

      const out = {
        profile: getCleanProfileForDownload(player),
        stats: statsIndex[id] || {}
      };

      downloadTextFile(
        `${id || "player"}_profile_stats.json`,
        JSON.stringify(out, null, 2),
        "application/json"
      );
    }

    els.searchInput.addEventListener("input", applyFilters);
    els.countryFilter.addEventListener("change", applyFilters);
    els.activeFilter.addEventListener("change", applyFilters);

    els.resetBtn.addEventListener("click", () => {
      els.searchInput.value = "";
      els.countryFilter.value = "";
      els.activeFilter.value = "";
      currentSort = "name";
      applyFilters();
    });

    els.sortNameBtn.addEventListener("click", () => {
      currentSort = "name";
      applyFilters();
    });

    els.sortCountryBtn.addEventListener("click", () => {
      currentSort = "country";
      applyFilters();
    });

    els.sortActiveBtn.addEventListener("click", () => {
      currentSort = "active";
      applyFilters();
    });

    els.downloadJsonBtn.addEventListener("click", downloadCombinedJson);
    els.downloadCsvBtn.addEventListener("click", downloadCombinedCsv);

    els.profileToggle.addEventListener("click", () => {
      currentView = "profile";
      isEditingProfile = false;
      updateModalToggles();
      renderModalContent();
    });

    els.statsToggle.addEventListener("click", () => {
      currentView = "stats";
      isEditingProfile = false;
      updateModalToggles();
      renderModalContent();
    });

    els.closeModalBtn.addEventListener("click", closeModal);

    els.modalBackdrop.addEventListener("click", event => {
      if (event.target === els.modalBackdrop) {
        closeModal();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    loadData();
  </script>
</body>
</html>
