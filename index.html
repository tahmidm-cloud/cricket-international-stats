<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#061018" />
  <title>My Cricket Player Database</title>

  <style>
    :root {
      --bg: #061018;
      --bg2: #020617;
      --panel: rgba(15, 23, 42, 0.96);
      --panel2: rgba(30, 41, 59, 0.92);
      --panel3: rgba(2, 6, 23, 0.72);
      --line: rgba(148, 163, 184, 0.22);
      --line2: rgba(148, 163, 184, 0.13);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --gold: #facc15;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #fb7185;
      --white: #ffffff;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.48);
      --radius: 20px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(250, 204, 21, 0.10), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(1460px, 100%);
      margin: 0 auto;
      padding: calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));
    }

    .top-card {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.88));
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-main-btn {
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.7);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    h1 {
      margin: 10px 0 4px;
      font-size: clamp(24px, 6vw, 42px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .status-pill {
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.62);
      color: var(--muted);
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 150px 150px 110px;
      gap: 10px;
      margin-top: 14px;
    }

    .search-input,
    .filter-select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.76);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      outline: none;
      min-width: 0;
    }

    .search-input:focus,
    .filter-select:focus {
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
    }

    .main-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px;
      color: #020617;
      background: linear-gradient(135deg, var(--gold), var(--blue));
      font-weight: 950;
      cursor: pointer;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    .summary-box {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.78);
      border-radius: 18px;
      padding: 12px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .summary-value {
      margin-top: 4px;
      color: var(--white);
      font-size: 22px;
      font-weight: 950;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 10px 0 12px;
      flex-wrap: wrap;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
    }

    .small-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.74);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 750;
    }

    .ghost-btn:hover {
      border-color: rgba(250, 204, 21, 0.55);
    }

    .player-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 11px;
      padding-bottom: 40px;
    }

    .player-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.9));
      border-radius: 18px;
      padding: 13px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      min-width: 0;
    }

    .player-card:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.65);
    }

    .player-name {
      color: var(--white);
      font-size: 16px;
      font-weight: 950;
      line-height: 1.2;
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .player-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.56);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 11px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .mini-box {
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(2, 6, 23, 0.42);
      border-radius: 12px;
      padding: 8px;
      min-width: 0;
    }

    .mini-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }

    .mini-value {
      font-size: 13px;
      font-weight: 850;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .loading,
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 34px 10px;
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.52);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bottom));
      background: rgba(2, 6, 23, 0.78);
      backdrop-filter: blur(8px);
      z-index: 2000;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(1000px, calc(100vw - 16px));
      max-height: calc(100dvh - 18px - var(--safe-top) - var(--safe-bottom));
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.99), rgba(2, 6, 23, 0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .modal-title {
      color: var(--white);
      font-size: 24px;
      font-weight: 1000;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .modal-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .close-btn {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.6);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 950;
    }

    .modal-body {
      padding: 12px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.99), rgba(15, 23, 42, 0.86));
      padding-bottom: 8px;
    }

    .toggle-btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.84);
      color: var(--text);
      border-radius: 999px;
      padding: 10px;
      cursor: pointer;
      font-weight: 900;
      font-size: 13px;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--blue));
      color: #020617;
      border-color: transparent;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .profile-card {
      border: 1px solid var(--line2);
      background: rgba(15, 23, 42, 0.72);
      border-radius: 15px;
      padding: 10px;
      min-width: 0;
    }

    .profile-card.wide {
      grid-column: 1 / -1;
    }

    .profile-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .profile-value {
      color: var(--white);
      font-size: 14px;
      font-weight: 850;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .profile-value.small {
      font-size: 12px;
      font-weight: 650;
      color: var(--text);
    }

    .active-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(2, 6, 23, 0.5);
    }

    .active-pill.active {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.36);
    }

    .active-pill.inactive {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.36);
    }

    .stats-section-title {
      color: var(--text);
      font-weight: 950;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 13px;
      margin: 12px 0 8px;
    }

    .stats-table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line2);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.64);
    }

    .stats-table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .stats-table th,
    .stats-table td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      border-right: 1px solid rgba(148, 163, 184, 0.08);
      padding: 9px 10px;
      text-align: center;
      white-space: nowrap;
    }

    .stats-table th {
      color: var(--gold);
      background: rgba(2, 6, 23, 0.66);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .stats-table td {
      color: var(--text);
    }

    .stats-table th:first-child,
    .stats-table td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 3;
      background: rgba(7, 14, 27, 0.98);
      font-weight: 900;
      color: var(--white);
    }

    .stats-table th:first-child {
      z-index: 4;
      color: var(--gold);
      background: rgba(2, 6, 23, 0.98);
    }

    .strong-stat {
      font-weight: 950;
      color: var(--white);
    }

    .source-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      margin-top: 10px;
    }

    .load-more-wrap {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 8px 0 30px;
    }

    @media (max-width: 760px) {
      .page {
        padding-left: 10px;
        padding-right: 10px;
      }

      .top-card {
        border-radius: 20px;
        padding: 13px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .summary-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary-value {
        font-size: 20px;
      }

      .player-list {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .player-card {
        border-radius: 16px;
        padding: 12px;
      }

      .modal {
        width: calc(100vw - 12px);
        max-height: calc(100dvh - 12px - var(--safe-top) - var(--safe-bottom));
        border-radius: 18px;
      }

      .modal-header {
        padding: 12px;
      }

      .modal-title {
        font-size: 20px;
      }

      .modal-body {
        padding: 10px;
      }

      .profile-grid {
        grid-template-columns: 1fr;
      }

      .stats-table {
        min-width: 820px;
        font-size: 12px;
      }

      .stats-table th,
      .stats-table td {
        padding: 8px 9px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="top-card">
      <div class="top-row">
        <div>
          <button class="back-main-btn" type="button" onclick="window.location.href='index.html'">
            ← Back to Main Menu
          </button>
          <h1>Player Database</h1>
          <div class="subtitle">
            Lists every player from the slim ESPN player index. Tap a player to view profile or stats.
          </div>
        </div>

        <div class="status-pill" id="loadStatus">Loading JSON...</div>
      </div>

      <div class="controls">
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Search player, country, role, style, Cricinfo ID..."
          autocomplete="off"
        />

        <select id="countryFilter" class="filter-select">
          <option value="">All Countries</option>
        </select>

        <select id="activeFilter" class="filter-select">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="blank">Unknown</option>
        </select>

        <button class="main-btn" id="resetBtn" type="button">Reset</button>
      </div>
    </section>

    <section class="summary-row">
      <div class="summary-box">
        <div class="summary-label">Total Players</div>
        <div class="summary-value" id="totalPlayers">—</div>
      </div>

      <div class="summary-box">
        <div class="summary-label">Countries</div>
        <div class="summary-value" id="totalCountries">—</div>
      </div>

      <div class="summary-box">
        <div class="summary-label">Showing</div>
        <div class="summary-value" id="showingCount">—</div>
      </div>

      <div class="summary-box">
        <div class="summary-label">Stats Source</div>
        <div class="summary-value" style="font-size: 16px;">Profile + Stats</div>
      </div>
    </section>

    <div class="toolbar">
      <div class="result-count" id="resultCount">Preparing player list...</div>

      <div class="small-actions">
        <button class="ghost-btn" id="sortNameBtn" type="button">Sort A-Z</button>
        <button class="ghost-btn" id="sortCountryBtn" type="button">Sort Country</button>
        <button class="ghost-btn" id="sortActiveBtn" type="button">Sort Active</button>
      </div>
    </div>

    <section id="playerList" class="player-list">
      <div class="loading">Loading players...</div>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <section class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">Player</div>
          <div class="modal-subtitle" id="modalSubtitle">Country • Cricinfo ID</div>
        </div>

        <button class="close-btn" id="closeModalBtn" type="button">×</button>
      </div>

      <div class="modal-body">
        <div class="toggle-row">
          <button class="toggle-btn active" id="profileToggle" type="button">Player Profile</button>
          <button class="toggle-btn" id="statsToggle" type="button">Player Stats</button>
        </div>

        <div id="modalContent"></div>
      </div>
    </section>
  </div>

  <script>
    const PROFILE_JSON_PATH = "outputs/player_index_espn_slim_keyed.json";
    const STATS_JSON_PATH = "outputs/all_international_stats_enriched.json";

    let allPlayers = [];
    let filteredPlayers = [];
    let statsIndex = {};
    let currentPlayer = null;
    let currentView = "profile";
    let currentSort = "name";
    let visibleLimit = 300;

    const FORMAT_ROWS = [
      { key: "test", altKeys: ["test", "tests"], label: "Tests" },
      { key: "odi", altKeys: ["odi", "odis"], label: "ODIs" },
      { key: "t20", altKeys: ["t20", "t20i", "t20is"], label: "T20Is" },
      { key: "fc", altKeys: ["fc", "firstclass", "first_class"], label: "FC" },
      { key: "lista", altKeys: ["lista", "list_a", "listA"], label: "List A" },
      { key: "t20s", altKeys: ["t20s", "domestic_t20"], label: "T20s" }
    ];

    const els = {
      loadStatus: document.getElementById("loadStatus"),
      searchInput: document.getElementById("searchInput"),
      countryFilter: document.getElementById("countryFilter"),
      activeFilter: document.getElementById("activeFilter"),
      resetBtn: document.getElementById("resetBtn"),
      totalPlayers: document.getElementById("totalPlayers"),
      totalCountries: document.getElementById("totalCountries"),
      showingCount: document.getElementById("showingCount"),
      resultCount: document.getElementById("resultCount"),
      playerList: document.getElementById("playerList"),
      sortNameBtn: document.getElementById("sortNameBtn"),
      sortCountryBtn: document.getElementById("sortCountryBtn"),
      sortActiveBtn: document.getElementById("sortActiveBtn"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      closeModalBtn: document.getElementById("closeModalBtn"),
      modalTitle: document.getElementById("modalTitle"),
      modalSubtitle: document.getElementById("modalSubtitle"),
      profileToggle: document.getElementById("profileToggle"),
      statsToggle: document.getElementById("statsToggle"),
      modalContent: document.getElementById("modalContent")
    };

    function cleanText(value) {
      if (
        value === null ||
        value === undefined ||
        value === "" ||
        value === "null" ||
        value === "None" ||
        value === "none" ||
        value === "NaN" ||
        value === "nan"
      ) {
        return "";
      }

      return String(value).trim();
    }

    function showValue(value, fallback = "—") {
      const cleaned = cleanText(value);
      return cleaned || fallback;
    }

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function escapeHtml(value) {
      return String(showValue(value, ""))
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getId(player) {
      return cleanText(player.cricinfo_id || player.unique_player_id || player.id);
    }

    function getName(player) {
      return cleanText(
        player.final_player_name ||
        player.espn_display_name ||
        player.espn_full_name
      ) || "Unknown Player";
    }

    function getFullName(player) {
      return cleanText(player.espn_full_name || player.espn_display_name || getName(player));
    }

    function getCountry(player) {
      return cleanText(player.espn_country_name || player.source_country_text) || "Unknown";
    }

    function getStatus(player) {
      return cleanText(player.espn_active_status);
    }

    function getStatusLabel(player) {
      const status = getStatus(player);

      if (status === "active") return "Active";
      if (status === "inactive") return "Inactive";

      return "Unknown";
    }

    function calculateAge(dob) {
      dob = cleanText(dob);

      if (!dob) return "";

      const birthDate = new Date(dob);

      if (Number.isNaN(birthDate.getTime())) return "";

      const today = new Date();
      let age = today.getFullYear() - birthDate.getFullYear();
      const monthDiff = today.getMonth() - birthDate.getMonth();
      const dayDiff = today.getDate() - birthDate.getDate();

      if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age--;
      }

      return age > 0 ? String(age) : "";
    }

    async function fetchJson(path, fallback) {
      try {
        const response = await fetch(path, { cache: "no-store" });

        if (!response.ok) {
          console.warn(`Could not load ${path}. Status ${response.status}`);
          return fallback;
        }

        return await response.json();
      } catch (err) {
        console.warn(`Could not load ${path}`, err);
        return fallback;
      }
    }

    function normalizeProfiles(data) {
      if (Array.isArray(data)) {
        return data;
      }

      if (data && typeof data === "object") {
        return Object.entries(data).map(([id, player]) => ({
          cricinfo_id: player.cricinfo_id || id,
          ...player
        }));
      }

      return [];
    }

    async function loadData() {
      els.loadStatus.textContent = "Loading JSON...";

      const [profileData, statsData] = await Promise.all([
        fetchJson(PROFILE_JSON_PATH, {}),
        fetchJson(STATS_JSON_PATH, {})
      ]);

      allPlayers = normalizeProfiles(profileData);
      statsIndex = statsData || {};

      allPlayers.sort((a, b) => getName(a).localeCompare(getName(b)));
      filteredPlayers = [...allPlayers];

      buildFilters();
      updateSummary();
      renderPlayers();

      els.loadStatus.textContent = `Loaded ${allPlayers.length.toLocaleString()} players`;
    }

    function buildFilters() {
      const countries = [...new Set(allPlayers.map(getCountry).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));

      els.countryFilter.innerHTML = `
        <option value="">All Countries</option>
        ${countries.map(country => `
          <option value="${escapeHtml(country)}">${escapeHtml(country)}</option>
        `).join("")}
      `;
    }

    function applyFilters() {
      const q = els.searchInput.value.trim().toLowerCase();
      const country = els.countryFilter.value;
      const active = els.activeFilter.value;

      filteredPlayers = allPlayers.filter(player => {
        const status = getStatus(player);

        const blob = [
          getId(player),
          getName(player),
          getFullName(player),
          getCountry(player),
          player.source_country_text,
          player.espn_playing_role,
          player.espn_playing_role_id,
          player.standard_batting_code,
          player.standard_batting_style,
          player.standard_bowling_code,
          player.standard_bowling_style,
          player.espn_major_teams,
          status
        ].join(" ").toLowerCase();

        const matchesSearch = !q || blob.includes(q);
        const matchesCountry = !country || getCountry(player) === country;

        let matchesActive = true;

        if (active === "active") {
          matchesActive = status === "active";
        } else if (active === "inactive") {
          matchesActive = status === "inactive";
        } else if (active === "blank") {
          matchesActive = !status;
        }

        return matchesSearch && matchesCountry && matchesActive;
      });

      visibleLimit = 300;
      sortPlayers();
      updateSummary();
      renderPlayers();
    }

    function sortPlayers() {
      if (currentSort === "country") {
        filteredPlayers.sort((a, b) => {
          const c = getCountry(a).localeCompare(getCountry(b));
          return c || getName(a).localeCompare(getName(b));
        });
        return;
      }

      if (currentSort === "active") {
        filteredPlayers.sort((a, b) => {
          const s = getStatusLabel(a).localeCompare(getStatusLabel(b));
          return s || getName(a).localeCompare(getName(b));
        });
        return;
      }

      filteredPlayers.sort((a, b) => getName(a).localeCompare(getName(b)));
    }

    function updateSummary() {
      const countries = new Set(allPlayers.map(getCountry).filter(Boolean));

      els.totalPlayers.textContent = allPlayers.length.toLocaleString();
      els.totalCountries.textContent = countries.size.toLocaleString();
      els.showingCount.textContent = filteredPlayers.length.toLocaleString();
      els.resultCount.textContent =
        `Showing ${Math.min(visibleLimit, filteredPlayers.length).toLocaleString()} of ${filteredPlayers.length.toLocaleString()} filtered players`;
    }

    function renderPlayers() {
      if (!filteredPlayers.length) {
        els.playerList.innerHTML = `<div class="empty">No players found.</div>`;
        return;
      }

      const visiblePlayers = filteredPlayers.slice(0, visibleLimit);

      const cards = visiblePlayers.map((player, index) => {
        const status = getStatus(player);
        const statusClass = status === "active" ? "active" : status === "inactive" ? "inactive" : "";

        return `
          <article class="player-card" data-index="${index}" tabindex="0">
            <div class="player-name">${escapeHtml(getName(player))}</div>

            <div class="player-meta">
              <span class="chip">${escapeHtml(getCountry(player))}</span>
              <span class="chip">ID: ${escapeHtml(getId(player))}</span>
              <span class="chip">${escapeHtml(getStatusLabel(player))}</span>
            </div>

            <div class="mini-grid">
              <div class="mini-box">
                <div class="mini-label">Role</div>
                <div class="mini-value">${escapeHtml(showValue(player.espn_playing_role))}</div>
              </div>

              <div class="mini-box">
                <div class="mini-label">Bat</div>
                <div class="mini-value">${escapeHtml(showValue(player.standard_batting_code))}</div>
              </div>

              <div class="mini-box">
                <div class="mini-label">Bowl</div>
                <div class="mini-value">${escapeHtml(showValue(player.standard_bowling_code, "None"))}</div>
              </div>

              <div class="mini-box">
                <div class="mini-label">DOB</div>
                <div class="mini-value">${escapeHtml(showValue(player.espn_date_of_birth))}</div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      const loadMore =
        visibleLimit < filteredPlayers.length
          ? `
            <div class="load-more-wrap">
              <button class="main-btn" id="loadMoreBtn" type="button">
                Load More Players
              </button>
            </div>
          `
          : "";

      els.playerList.innerHTML = cards + loadMore;

      document.querySelectorAll(".player-card").forEach(card => {
        card.addEventListener("click", () => {
          const index = Number(card.dataset.index);
          openModal(visiblePlayers[index]);
        });

        card.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            const index = Number(card.dataset.index);
            openModal(visiblePlayers[index]);
          }
        });
      });

      const loadMoreBtn = document.getElementById("loadMoreBtn");

      if (loadMoreBtn) {
        loadMoreBtn.addEventListener("click", () => {
          visibleLimit += 300;
          updateSummary();
          renderPlayers();
        });
      }
    }

    function openModal(player) {
      currentPlayer = player;
      currentView = "profile";

      els.modalTitle.textContent = getFullName(player);
      els.modalSubtitle.textContent =
        `${getCountry(player)} • Cricinfo ID: ${getId(player)}`;

      updateModalToggles();
      renderModalContent();

      els.modalBackdrop.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      els.modalBackdrop.classList.remove("show");
      document.body.style.overflow = "";
      currentPlayer = null;
    }

    function updateModalToggles() {
      els.profileToggle.classList.toggle("active", currentView === "profile");
      els.statsToggle.classList.toggle("active", currentView === "stats");
    }

    function renderModalContent() {
      if (!currentPlayer) return;

      if (currentView === "profile") {
        renderProfile();
      } else {
        renderStats();
      }
    }

    function renderProfile() {
      const p = currentPlayer;
      const age = calculateAge(p.espn_date_of_birth);
      const status = getStatus(p);
      const statusClass = status === "active" ? "active" : status === "inactive" ? "inactive" : "";

      els.modalContent.innerHTML = `
        <div class="profile-grid">
          <div class="profile-card">
            <div class="profile-label">Display Name</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_display_name || p.final_player_name))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Full Name</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_full_name))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">First Name</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_first_name))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Last Name</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_last_name))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Date of Birth</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_date_of_birth))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Age</div>
            <div class="profile-value">${escapeHtml(showValue(age))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Active Status</div>
            <div class="profile-value">
              <span class="active-pill ${statusClass}">
                ${escapeHtml(getStatusLabel(p))}
              </span>
            </div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Country</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_country_name || p.source_country_text))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Playing Role</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_playing_role))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Role ID</div>
            <div class="profile-value">${escapeHtml(showValue(p.espn_playing_role_id))}</div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Batting Style</div>
            <div class="profile-value">
              ${escapeHtml(showValue(p.standard_batting_style))}
              <span style="color: var(--muted); font-size: 12px;">
                ${escapeHtml(showValue(p.standard_batting_code, ""))}
              </span>
            </div>
          </div>

          <div class="profile-card">
            <div class="profile-label">Bowling Style</div>
            <div class="profile-value">
              ${escapeHtml(showValue(p.standard_bowling_style, "No Bowling"))}
              <span style="color: var(--muted); font-size: 12px;">
                ${escapeHtml(showValue(p.standard_bowling_code, ""))}
              </span>
            </div>
          </div>

          <div class="profile-card wide">
            <div class="profile-label">Major Teams</div>
            <div class="profile-value small">${escapeHtml(showValue(p.espn_major_teams))}</div>
          </div>
        </div>
      `;
    }

    function getStatsObject(player) {
      const id = getId(player);
      return statsIndex[id] || {};
    }

    function getFormatData(stats, type, formatRow) {
      const bucket = stats?.[type] || {};

      for (const key of formatRow.altKeys) {
        if (bucket[key]) {
          return bucket[key];
        }
      }

      return {};
    }

    function hasAnyData(obj) {
      if (!obj || typeof obj !== "object") return false;

      return Object.values(obj).some(value => {
        if (value === null || value === undefined || value === "") return false;
        if (String(value).toLowerCase() === "nan") return false;
        return true;
      });
    }

    function formatSpan(s) {
      if (s.Span) return s.Span;

      const start = cleanText(s.Start);
      const end = cleanText(s.End);

      if (start || end) {
        return `${start || "?"}-${end || "?"}`;
      }

      return "";
    }

    function formatHighScore(score, notOut) {
      if (score === null || score === undefined || score === "") return "";

      const isNotOut =
        notOut === true ||
        notOut === "true" ||
        notOut === "1" ||
        notOut === "*";

      return `${score}${isNotOut ? "*" : ""}`;
    }

    function renderStats() {
      const stats = getStatsObject(currentPlayer);

      if (!stats || Object.keys(stats).length === 0) {
        els.modalContent.innerHTML = `
          <div class="empty">
            No real-world stats found for this player.
          </div>
        `;
        return;
      }

      els.modalContent.innerHTML = `
        <div class="stats-section-title">Batting & Fielding</div>
        <div class="stats-table-wrap">
          <table class="stats-table">
            <thead>
              <tr>
                <th>Format</th>
                <th>Mat</th>
                <th>Inns</th>
                <th>NO</th>
                <th>Runs</th>
                <th>HS</th>
                <th>Ave</th>
                <th>BF</th>
                <th>SR</th>
                <th>100s</th>
                <th>50s</th>
                <th>4s</th>
                <th>6s</th>
                <th>Ct</th>
                <th>St</th>
              </tr>
            </thead>
            <tbody>
              ${FORMAT_ROWS.map(row => renderBatFieldRow(stats, row)).join("")}
            </tbody>
          </table>
        </div>

        <div class="stats-section-title">Bowling</div>
        <div class="stats-table-wrap">
          <table class="stats-table">
            <thead>
              <tr>
                <th>Format</th>
                <th>Mat</th>
                <th>Inns</th>
                <th>Balls</th>
                <th>Runs</th>
                <th>Wkts</th>
                <th>BBI</th>
                <th>BBM</th>
                <th>Ave</th>
                <th>Econ</th>
                <th>SR</th>
                <th>4w</th>
                <th>5w</th>
                <th>10w</th>
              </tr>
            </thead>
            <tbody>
              ${FORMAT_ROWS.map(row => renderBowlingRow(stats, row)).join("")}
            </tbody>
          </table>
        </div>

        <div class="source-note">
          Tables use your enriched international stats JSON. If FC, List A, or domestic T20 data is not present, those rows show —.
        </div>
      `;
    }

    function renderBatFieldRow(stats, row) {
      const bat = getFormatData(stats, "batting", row);
      const field = getFormatData(stats, "fielding", row);

      const empty = !hasAnyData(bat) && !hasAnyData(field);

      return `
        <tr>
          <td>${escapeHtml(row.label)}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Matches || field.Matches))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Innings))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.NotOuts))}</td>
          <td class="strong-stat">${escapeHtml(empty ? "—" : showValue(bat.Runs))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(formatHighScore(bat.HighScore, bat.HighScoreNotOut)))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Average))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.BallsFaced))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.StrikeRate))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Hundreds))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Fifties))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Fours))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bat.Sixes))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(field.Caught || field.CaughtFielder || field.CaughtBehind))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(field.Stumped))}</td>
        </tr>
      `;
    }

    function renderBowlingRow(stats, row) {
      const bowl = getFormatData(stats, "bowling", row);
      const empty = !hasAnyData(bowl);

      return `
        <tr>
          <td>${escapeHtml(row.label)}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Matches))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Innings))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Balls))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.RunsConceded || bowl.Runs))}</td>
          <td class="strong-stat">${escapeHtml(empty ? "—" : showValue(bowl.Wickets))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.BestBowlingInnings))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.BestBowlingMatch))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Average))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.Economy))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.StrikeRate))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.FourWickets))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.FiveWickets))}</td>
          <td>${escapeHtml(empty ? "—" : showValue(bowl.TenWickets))}</td>
        </tr>
      `;
    }

    els.searchInput.addEventListener("input", applyFilters);
    els.countryFilter.addEventListener("change", applyFilters);
    els.activeFilter.addEventListener("change", applyFilters);

    els.resetBtn.addEventListener("click", () => {
      els.searchInput.value = "";
      els.countryFilter.value = "";
      els.activeFilter.value = "";
      currentSort = "name";
      applyFilters();
    });

    els.sortNameBtn.addEventListener("click", () => {
      currentSort = "name";
      applyFilters();
    });

    els.sortCountryBtn.addEventListener("click", () => {
      currentSort = "country";
      applyFilters();
    });

    els.sortActiveBtn.addEventListener("click", () => {
      currentSort = "active";
      applyFilters();
    });

    els.profileToggle.addEventListener("click", () => {
      currentView = "profile";
      updateModalToggles();
      renderModalContent();
    });

    els.statsToggle.addEventListener("click", () => {
      currentView = "stats";
      updateModalToggles();
      renderModalContent();
    });

    els.closeModalBtn.addEventListener("click", closeModal);

    els.modalBackdrop.addEventListener("click", event => {
      if (event.target === els.modalBackdrop) {
        closeModal();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    loadData();
  </script>
</body>
</html>
