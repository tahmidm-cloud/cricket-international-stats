name: Inspect Cricdata Bio

on:
  workflow_dispatch:
    inputs:
      player_id:
        description: "Cricinfo player ID"
        required: true
        default: "8166"
      player_name:
        description: "Player name for note only"
        required: false
        default: "Shane Warne"

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install cricdata pandas python-dateutil beautifulsoup4 lxml tqdm requests

      - name: Create output folders
        run: |
          mkdir -p outputs/bio_inspect

      - name: Inspect cricdata bio object
        env:
          TEST_ID: ${{ github.event.inputs.player_id }}
          PLAYER_NAME: ${{ github.event.inputs.player_name }}
        run: |
          python scripts/inspect_cricdata_bio.py

      - name: Upload inspection output
        uses: actions/upload-artifact@v4
        with:
          name: cricdata-bio-inspect-${{ github.event.inputs.player_id }}
          path: |
            outputs/bio_inspect/*.json
            outputs/bio_inspect/*.txt