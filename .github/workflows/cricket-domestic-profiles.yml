name: Cricket Domestic Profiles

on:
  workflow_dispatch:
    inputs:
      sleep_min:
        description: "Minimum sleep seconds between ESPN requests"
        required: true
        default: "8"
      sleep_max:
        description: "Maximum sleep seconds between ESPN requests"
        required: true
        default: "18"
      chunk_size:
        description: "Players per chunk"
        required: true
        default: "50"
      max_parallel:
        description: "How many chunks run at same time. Use 1 for safest ESPN behavior."
        required: true
        default: "1"

permissions:
  contents: write
  actions: read

concurrency:
  group: cricket-domestic-profiles
  cancel-in-progress: false

jobs:
  prepare-matrix:
    name: Prepare domestic profile matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      total_players: ${{ steps.set-matrix.outputs.total_players }}
      chunk_count: ${{ steps.set-matrix.outputs.chunk_count }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr","readr","jsonlite","stringr"), repos="https://cloud.r-project.org")'

      - name: Build dynamic matrix
        env:
          CHUNK_SIZE: ${{ github.event.inputs.chunk_size }}
        run: |
          Rscript scripts/make_domestic_profile_matrix.R

      - name: Set matrix output
        id: set-matrix
        run: |
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          cat outputs/domestic_profile_matrix.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          TOTAL_PLAYERS=$(Rscript -e 'x <- read.csv("outputs/domestic_profile_matrix_summary.csv"); cat(x$total_players[1])')
          CHUNK_COUNT=$(Rscript -e 'x <- read.csv("outputs/domestic_profile_matrix_summary.csv"); cat(x$chunk_count[1])')

          echo "total_players=$TOTAL_PLAYERS" >> $GITHUB_OUTPUT
          echo "chunk_count=$CHUNK_COUNT" >> $GITHUB_OUTPUT

          echo "Total players: $TOTAL_PLAYERS"
          echo "Chunk count: $CHUNK_COUNT"

      - name: Upload matrix summary
        uses: actions/upload-artifact@v4
        with:
          name: domestic-profile-matrix
          path: |
            outputs/domestic_profile_matrix.json
            outputs/domestic_profile_matrix_summary.csv

  scrape-profile-chunks:
    name: Domestic/Profile ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    needs: prepare-matrix

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("rvest","dplyr","purrr","stringr","tibble","readr","jsonlite","httr"), repos="https://cloud.r-project.org")'

      - name: Run domestic/profile chunk
        env:
          CHUNK_LABEL: ${{ matrix.label }}
          ROW_START: ${{ matrix.start }}
          ROW_END: ${{ matrix.end }}
          SLEEP_MIN: ${{ github.event.inputs.sleep_min }}
          SLEEP_MAX: ${{ github.event.inputs.sleep_max }}
        run: |
          echo "Running chunk $CHUNK_LABEL rows $ROW_START-$ROW_END"
          Rscript scripts/scrape_domestic_profiles_chunk.R | tee domestic_profile_${CHUNK_LABEL}.txt

      - name: Upload domestic/profile chunk
        uses: actions/upload-artifact@v4
        with:
          name: domestic-profile-${{ matrix.label }}
          path: |
            outputs/domestic_profile_chunks/**
            domestic_profile_${{ matrix.label }}.txt

  combine-domestic-profiles:
    name: Combine domestic/profile files
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - prepare-matrix
      - scrape-profile-chunks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr","purrr","stringr","tibble","readr","jsonlite"), repos="https://cloud.r-project.org")'

      - name: Download all domestic/profile artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_domestic_profile_artifacts

      - name: Combine domestic/profile chunks
        run: |
          Rscript scripts/combine_domestic_profiles.R | tee combine_domestic_profiles_log.txt

      - name: Upload final domestic/profile outputs
        uses: actions/upload-artifact@v4
        with:
          name: final-domestic-profile-files
          path: |
            outputs/player_profiles_domestic.csv
            outputs/player_profiles_domestic.json
            outputs/domestic_career_stats.csv
            outputs/domestic_career_stats.json
            outputs/domestic_profile_errors.csv
            outputs/domestic_profile_summary.csv
            combine_domestic_profiles_log.txt

      - name: Commit domestic/profile outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add outputs/player_profiles_domestic.csv
          git add outputs/player_profiles_domestic.json
          git add outputs/domestic_career_stats.csv
          git add outputs/domestic_career_stats.json
          git add outputs/domestic_profile_errors.csv
          git add outputs/domestic_profile_summary.csv
          git add combine_domestic_profiles_log.txt

          if git diff --cached --quiet; then
            echo "No domestic/profile output changes to commit."
          else
            git commit -m "Add domestic cricket profile data"
            git push
          fi