name: Inspect Cricinfo Stats Page

on:
  workflow_dispatch:
    inputs:
      player_id:
        description: "Cricinfo player ID"
        required: true
        default: "8166"
      player_slug:
        description: "Cricinfo slug"
        required: true
        default: "shane-warne"

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas tqdm

      - name: Create output folders
        run: |
          mkdir -p outputs/cricinfo_stats_page_inspect

      - name: Inspect Cricinfo stats page
        env:
          PLAYER_ID: ${{ github.event.inputs.player_id }}
          PLAYER_SLUG: ${{ github.event.inputs.player_slug }}
        run: |
          python scripts/inspect_cricinfo_stats_page.py

      - name: Upload inspection output
        uses: actions/upload-artifact@v4
        with:
          name: cricinfo-stats-page-inspect-${{ github.event.inputs.player_id }}
          path: |
            outputs/cricinfo_stats_page_inspect/*