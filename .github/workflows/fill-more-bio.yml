name: Fill More Bio + Clean T20s

on:
  workflow_dispatch:
    inputs:
      input_csv:
        description: "CSV to improve"
        required: true
        default: "outputs/bio_t20s_only.csv"
      sleep_seconds:
        description: "Delay between requests"
        required: true
        default: "1.0"
      attempts:
        description: "Bio retry attempts per player"
        required: true
        default: "4"
      max_fetch_rows:
        description: "0 = no limit"
        required: true
        default: "0"
      force_fetch_all:
        description: "1 = retry every row bio, 0 = only missing/error rows"
        required: true
        default: "0"
      commit_outputs:
        description: "Commit outputs back to repo"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  fill-more-bio:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run more-fill cleanup
        env:
          INPUT_CSV: ${{ github.event.inputs.input_csv }}
          OUTPUT_PREFIX: outputs/bio_t20s_more_filled
          SLEEP_SECONDS: ${{ github.event.inputs.sleep_seconds }}
          ATTEMPTS: ${{ github.event.inputs.attempts }}
          MAX_FETCH_ROWS: ${{ github.event.inputs.max_fetch_rows }}
          FORCE_FETCH_ALL: ${{ github.event.inputs.force_fetch_all }}
        run: |
          python scripts/fill_more_bio_t20s.py

      - name: Upload improved files
        uses: actions/upload-artifact@v4
        with:
          name: bio-t20s-more-filled
          path: |
            outputs/bio_t20s_more_filled.csv
            outputs/bio_t20s_more_filled_keyed.json
            outputs/bio_t20s_more_filled_still_needs_retry.csv
            outputs/bio_t20s_more_filled_report.csv

      - name: Commit improved files
        if: ${{ github.event.inputs.commit_outputs == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/bio_t20s_more_filled.csv \
                  outputs/bio_t20s_more_filled_keyed.json \
                  outputs/bio_t20s_more_filled_still_needs_retry.csv \
                  outputs/bio_t20s_more_filled_report.csv
          git commit -m "Fill more bio and T20s fields" || echo "No changes to commit"
          git push